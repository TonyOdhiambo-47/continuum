name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  native:
    name: native (gcc + sanity test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build terminal binary
        run: make terminal
      - name: Run solver sanity test
        run: make test

  wasm:
    name: wasm (emscripten)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
      - name: Verify emcc
        run: emcc --version
      - name: Build WASM core
        run: make wasm
      - name: Sanity-check artefacts
        run: |
          test -f web/public/fluid.js
          test -f web/public/fluid.wasm
          ls -lh web/public/fluid.*

  web:
    name: web (typescript + vite)
    runs-on: ubuntu-latest
    needs: wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm install
      - name: Type-check
        working-directory: web
        run: npx tsc --noEmit
      - name: Build
        working-directory: web
        run: npx vite build
